name: GitHub Streak Guard

on:
  schedule:
    # 2:00 PM IST -> 08:30 UTC (stage1 - morning)
    - cron: '30 8 * * *'
    # 5:00 PM IST -> 11:30 UTC (stage2 - afternoon)
    - cron: '30 11 * * *'
    # 8:00 PM IST -> 14:30 UTC (stage3 - evening)
    - cron: '30 14 * * *'
    # 10:00 PM IST -> 16:30 UTC (stage4 - night)
    - cron: '30 16 * * *'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Which stage to simulate (stage1, stage2, stage3, stage4)'
        required: false
        default: 'stage1'

jobs:
  check-streak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Determine stage from trigger time
        id: stage
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "stage=${{ github.event.inputs.stage }}" >> "$GITHUB_OUTPUT"
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "08" ]; then
              echo "stage=stage1" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" = "11" ]; then
              echo "stage=stage2" >> "$GITHUB_OUTPUT"
            elif [ "$HOUR" = "14" ]; then
              echo "stage=stage3" >> "$GITHUB_OUTPUT"
            else
              echo "stage=stage4" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run streak check
        env:
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          CHECK_STAGE: ${{ steps.stage.outputs.stage }}
        run: python scripts/check_streak.py
